<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbiby — Conectando com TikTok</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        .logo {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
        .logo span { color: #6c63ff; }
        .status {
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 20px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top: 3px solid #6c63ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success { color: #4caf50; font-size: 1.2rem; display: none; }
        .error { color: #f44336; font-size: 1.2rem; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">ORBI<span>BY</span></div>
        <div class="status" id="status">Conectando com TikTok...</div>
        <div class="spinner" id="spinner"></div>
        <div class="success" id="success">✓ Conectado com sucesso!</div>
        <div class="error" id="error">Erro na conexão. Tente novamente.</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const error = params.get('error');

        if (error) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('status').style.display = 'none';
            document.getElementById('error').style.display = 'block';
        } else if (code) {
            document.getElementById('status').textContent = 'Autorizacao recebida! Finalizando...';
            setTimeout(() => {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('status').style.display = 'none';
                document.getElementById('success').style.display = 'block';
            }, 1500);
        } else {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('status').textContent = 'Pagina de retorno Orbiby x TikTok';
        }
    </script>
</body>
</html>
